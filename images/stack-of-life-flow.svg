<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="840" viewBox="0 0 1536 840" role="img" aria-labelledby="title desc">
  <title id="title">Stack of Life: Hardware to Cloud</title>
  <desc id="desc">A polished dark system-map diagram showing a technical journey from hardware and electronics through networking, Linux, Kubernetes, platform engineering, Go services, and cloud architecture.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06182a"/>
      <stop offset="0.52" stop-color="#030916"/>
      <stop offset="1" stop-color="#070b16"/>
    </linearGradient>
    <radialGradient id="radialA" cx="31%" cy="27%" r="65%">
      <stop offset="0" stop-color="#133c65" stop-opacity=".58"/>
      <stop offset=".5" stop-color="#08223d" stop-opacity=".22"/>
      <stop offset="1" stop-color="#020612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="radialB" cx="68%" cy="64%" r="55%">
      <stop offset="0" stop-color="#3a174b" stop-opacity=".36"/>
      <stop offset=".58" stop-color="#17102b" stop-opacity=".16"/>
      <stop offset="1" stop-color="#020612" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
