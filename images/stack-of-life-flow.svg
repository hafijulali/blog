      .num{font:900 19px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .panel{fill:#081322;stroke-width:1.8}
      .inner{fill:#0b1727;stroke-width:1.25}
      .pill{fill:#0e1b2b;stroke-width:1.2}
      .lineC{stroke:#34f3ff;stroke-width:3;fill:none;marker-end:url(#arrowC);filter:url(#glowC)}
      .lineB{stroke:#48a7ff;stroke-width:3;fill:none;marker-end:url(#arrowB);filter:url(#glowB)}
      .lineA{stroke:#ffb128;stroke-width:3;fill:none;marker-end:url(#arrowA);filter:url(#glowA)}
      .lineG{stroke:#7cff52;stroke-width:3;fill:none;marker-end:url(#arrowG);filter:url(#glowG)}
      .lineP{stroke:#ff5bd7;stroke-width:3;fill:none;marker-end:url(#arrowP);filter:url(#glowP)}
      .dashC{stroke:#34f3ff;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrowC)}
      .dashP{stroke:#ff5bd7;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrowP)}
    </style>
